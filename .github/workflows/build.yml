name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Toolchain Image
        run: docker build -f Containerfile -t waywidget-toolchain .

      - name: Run Package Script in Container
        run: |
          mkdir -p dest
          docker run --rm \
            -v $(pwd):/build:Z \
            waywidget-toolchain

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: waywidget-artifacts
          path: |
            dest/bin/waywidget
            dest/*.rpm
            dest/*.flatpak
