name: Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Toolchain Image
        run: docker build -f Containerfile -t waywidget-toolchain .

      - name: Run Package Script in Container
        run: |
          mkdir -p dest
          docker run --rm --privileged \
            -v $(pwd):/build:Z \
            waywidget-toolchain
          # Fix permissions for the runner user
          sudo chown -R $USER:$USER dest/

      - name: Debug Artifacts
        run: |
          ls -R dest/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: waywidget-artifacts
          path: |
            dest/bin/waywidget
            dest/*.rpm

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dest/bin/waywidget
            dest/*.rpm
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
