<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
    <!-- Sky Background -->
    <rect id="sky" x="0" y="0" width="800" height="450" fill="#020617" />
    
    <!-- Static Stars -->
    <g id="stars" opacity="0">
        <circle cx="100" cy="100" r="1" fill="white" />
        <circle cx="200" cy="50" r="1.5" fill="white" />
        <circle cx="350" cy="120" r="0.8" fill="white" />
        <circle cx="500" cy="80" r="1.2" fill="white" />
        <circle cx="650" cy="150" r="1" fill="white" />
        <circle cx="750" cy="40" r="1.1" fill="white" />
        <circle cx="50" cy="200" r="0.9" fill="white" />
        <circle cx="400" cy="30" r="1.3" fill="white" />
        <circle cx="600" cy="220" r="0.7" fill="white" />
        <circle cx="150" cy="250" r="1.4" fill="white" />
    </g>

    <!-- Sun Glow -->
    <defs>
        <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="yellow" stop-opacity="0.5" />
            <stop offset="100%" stop-color="yellow" stop-opacity="0" />
        </radialGradient>
    </defs>
    <circle id="glow" cx="400" cy="500" r="180" fill="url(#sunGlow)" />

    <!-- The Sun -->
    <circle id="sun" cx="400" cy="500" r="40" fill="#f87171" />

    <!-- Clouds -->
    <g id="clouds">
        <ellipse id="cloud1" cx="150" cy="100" rx="60" ry="20" fill="white" opacity="0.4" />
        <ellipse id="cloud2" cx="600" cy="150" rx="80" ry="25" fill="white" opacity="0.3" />
        <ellipse id="cloud3" cx="300" cy="60" rx="50" ry="15" fill="white" opacity="0.4" />
    </g>

    <!-- Landscape/Horizon -->
    <path d="M 0 380 Q 200 350 400 380 T 800 380 V 450 H 0 Z" fill="#052e16" id="land" />

    <!-- Timer Text -->
    <text id="timer" x="20" y="430" fill="white" font-family="monospace" font-size="12" opacity="0.4">00:00</text>
</svg>
