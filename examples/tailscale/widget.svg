<svg viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#232222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="400" rx="12" fill="url(#bg-grad)" stroke="#444" stroke-width="1.5"/>
  
  <!-- Header -->
  <g transform="translate(15, 15)">
    <!-- Logo -->
    <g id="logo">
      <circle cx="5" cy="5" r="4" fill="#67c1e3" />
      <circle cx="15" cy="15" r="4" fill="#67c1e3" />
      <circle cx="25" cy="5" r="4" fill="#67c1e3" />
      <circle cx="5" cy="25" r="4" fill="#67c1e3" />
      <circle cx="25" cy="25" r="4" fill="#67c1e3" />
    </g>
    <text id="hostname" x="45" y="12" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">Tailscale</text>
    <text id="self-ip" x="45" y="28" font-family="monospace" font-size="11" fill="#888">--.---.---.--</text>
    
    <circle id="status-dot" cx="285" cy="10" r="6" fill="#555" />
  </g>

  <line x1="15" y1="55" x2="305" y2="55" stroke="#333" stroke-width="1" />

  <!-- Peer List Container -->
  <text x="15" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#67c1e3">PEERS</text>
  <text id="peers-online" x="305" y="75" font-family="sans-serif" font-size="11" fill="#888" text-anchor="end">0 Online</text>

  <g id="peer-list" transform="translate(15, 90)">
    <!-- Peers will be dynamically injected here -->
    <text id="loading-text" x="145" y="100" font-family="sans-serif" font-size="14" fill="#444" text-anchor="middle">Loading Peers...</text>
  </g>

  <!-- Notification Area -->
  <rect id="toast-bg" x="60" y="360" width="200" height="25" rx="5" fill="#333" opacity="0" />
  <text id="toast-text" x="160" y="377" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0">Copied to clipboard!</text>
</svg>
