<svg viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#232222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="60" rx="10" fill="url(#bg-grad)" stroke="#444" stroke-width="1"/>
  
  <!-- Tailscale Logo Placeholder (Simple Dots) -->
  <g transform="translate(15, 15)">
    <circle cx="5" cy="5" r="4" fill="#67c1e3" />
    <circle cx="15" cy="15" r="4" fill="#67c1e3" />
    <circle cx="25" cy="5" r="4" fill="#67c1e3" />
    <circle cx="5" cy="25" r="4" fill="#67c1e3" />
    <circle cx="25" cy="25" r="4" fill="#67c1e3" />
  </g>

  <!-- Hostname -->
  <text id="hostname" x="55" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Loading...</text>
  
  <!-- IP Address -->
  <text id="ip" x="55" y="45" font-family="monospace" font-size="11" fill="#aaa">--.---.---.--</text>

  <!-- Status Indicator -->
  <circle id="status-dot" cx="280" cy="20" r="5" fill="#555" />
  <text id="peers-count" x="280" y="45" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">0</text>
  <text x="280" y="55" font-family="sans-serif" font-size="7" fill="#666" text-anchor="middle">PEERS</text>
</svg>
