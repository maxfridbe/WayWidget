<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 320" width="350" height="320">
  <defs>
    <style>
      .bg { fill: #1C1C1E; }
      .text-primary { fill: #FFFFFF; font-family: sans-serif; }
      .text-secondary { fill: #8E8E93; font-family: sans-serif; font-size: 11px; }
      .text-ip { fill: #4DA6FF; font-family: monospace; font-size: 12px; }
      .status-online { fill: #34C759; }
      .status-offline { fill: #5C5C5E; }
      .divider { stroke: #38383A; stroke-width: 1; }
      .card { fill: #2C2C2E; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="350" height="320" rx="16" class="bg" stroke="#333" stroke-width="1"/>

  <!-- Header -->
  <circle id="status-dot" cx="24" cy="28" r="5" class="status-offline"/>
  <text x="36" y="33" font-size="16" font-weight="600" class="text-primary">Tailscale Network</text>
  <text id="status-text" x="334" y="32" font-size="12" text-anchor="end" class="text-secondary">Connecting...</text>

  <line x1="16" y1="50" x2="334" y2="50" class="divider"/>

  <!-- Peer List Container -->
  <g id="peer-list" transform="translate(16, 65)">
    <text id="loading-text" x="159" y="100" class="text-secondary" text-anchor="middle">Checking for peers...</text>
  </g>

  <!-- Toast (Hidden by default) -->
  <g id="toast" opacity="0">
    <rect id="toast-bg-el" x="16" y="270" width="318" height="34" rx="8" fill="#1C1C1E" stroke="#4DA6FF" stroke-width="1" />
    <text id="toast-text-el" x="175" y="291" font-size="11" font-weight="500" fill="white" text-anchor="middle">Status Message</text>
  </g>
</svg>
