<svg viewBox="0 0 350 200" xmlns="http://www.w3.org/2000/svg" id="svg-root">
    <rect x="0" y="0" width="350" height="200" rx="15" fill="#1e1e2e" stroke="#cba6f7" stroke-width="2" />
    
    <text x="175" y="30" text-anchor="middle" fill="#cba6f7" font-family="monospace" font-size="18" font-weight="bold">Network Information</text>
    
    <!-- Local IP Section -->
    <text x="20" y="60" fill="#a6adc8" font-family="monospace" font-size="12">Local IP:</text>
    <g transform="translate(175, 80)">
        <rect x="-150" y="-15" width="300" height="30" rx="8" fill="#313244" />
        <text id="local-ip" x="0" y="5" text-anchor="middle" fill="#f5e0dc" font-family="monospace" font-size="16">Fetching...</text>
    </g>

    <!-- Public IP Section -->
    <text x="20" y="115" fill="#a6adc8" font-family="monospace" font-size="12">Public IP:</text>
    <g transform="translate(175, 135)">
        <rect x="-150" y="-15" width="300" height="30" rx="8" fill="#313244" />
        <text id="public-ip" x="0" y="5" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="16">Fetching...</text>
    </g>

    <text id="last-updated" x="175" y="180" text-anchor="middle" fill="#a6adc8" font-family="monospace" font-size="10">Last updated: --:--:--</text>
    
    <!-- Refresh Button -->
    <g id="refresh-btn" cursor="pointer" transform="translate(300, 15)">
        <rect x="0" y="0" width="35" height="18" rx="5" fill="#f38ba8" />
        <text x="17.5" y="12" text-anchor="middle" fill="#1e1e2e" font-family="sans-serif" font-size="9" font-weight="bold">REF</text>
    </g>
</svg>
