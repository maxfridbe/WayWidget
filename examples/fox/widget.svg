<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Ground Shadow -->
  <ellipse id="shadow" cx="100" cy="125" rx="45" ry="5" fill="#000000" opacity="0.15"/>

  <!-- Main Animated Fox Group -->
  <g id="fox">
    
    <!-- Back Legs (Dark Orange for depth) -->
    <path id="leg-hl-b" d="M 75,82 Q 60,100 75,115" fill="none" stroke="#D95D00" stroke-width="8" stroke-linecap="round"/>
    <path id="leg-fl-b" d="M 120,82 Q 130,100 120,115" fill="none" stroke="#D95D00" stroke-width="8" stroke-linecap="round"/>

    <!-- Tail -->
    <g id="tail">
      <!-- Orange Base -->
      <path d="M 65,75 C 40,60 15,65 10,85 C 20,100 45,95 65,82 Z" fill="#FF7A00"/>
      <!-- White Tip -->
      <path d="M 28,73 C 18,68 12,75 10,85 C 15,95 22,95 28,88 C 23,82 25,78 28,73 Z" fill="#FFFFFF"/>
    </g>

    <!-- Body -->
    <path d="M 60,70 C 80,60 110,60 130,70 C 135,80 125,90 100,90 C 80,90 65,85 60,70 Z" fill="#FF7A00"/>

    <!-- Chest Fluff -->
    <path d="M 128,72 Q 135,80 115,88 Q 115,78 128,72 Z" fill="#FFFFFF"/>

    <!-- Front Legs (Orange) -->
    <path id="leg-hl-f" d="M 75,82 Q 60,100 75,115" fill="none" stroke="#FF7A00" stroke-width="8" stroke-linecap="round"/>
    <path id="leg-fl-f" d="M 120,82 Q 130,100 120,115" fill="none" stroke="#FF7A00" stroke-width="8" stroke-linecap="round"/>

    <!-- Head -->
    <g id="head">
      <!-- Back Ear -->
      <path d="M 132,67 L 140,45 L 148,68 Z" fill="#D95D00"/>
      
      <!-- Front Ear -->
      <path d="M 125,65 L 130,42 L 140,66 Z" fill="#FF7A00"/>
      <path d="M 127,60 L 130,48 L 135,60 Z" fill="#1A1A1A" opacity="0.8"/>

      <!-- Face Upper (Orange) -->
      <path d="M 125,65 L 165,75 L 125,85 Z" fill="#FF7A00"/>
      <!-- Snout Lower (White) -->
      <path d="M 125,75 L 165,75 L 125,85 Z" fill="#FFFFFF"/>

      <!-- Nose -->
      <circle cx="164" cy="74" r="2.5" fill="#1A1A1A"/>
      <!-- Eye -->
      <circle cx="142" cy="70" r="2" fill="#1A1A1A"/>
    </g>
    
  </g>
</svg>
